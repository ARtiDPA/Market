version: '3.8'

services:
  auth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market_auth
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://market_user:market_pass@postgres:5432/market_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    command: uvicorn app.auth.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:15-alpine
    container_name: market_postgres
    environment:
      - POSTGRES_USER=market_user
      - POSTGRES_PASSWORD=market_pass
      - POSTGRES_DB=market_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: market_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
