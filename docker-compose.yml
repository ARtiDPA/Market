version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://market_user:market_pass@postgres:5432/market_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
    command: sh -c "sleep 5 && alembic -c app/auth/alembic.ini upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  postgres:
    image: postgres:15-alpine
    container_name: market_postgres
    environment:
      - POSTGRES_USER=market_user
      - POSTGRES_PASSWORD=market_pass
      - POSTGRES_DB=market_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: market_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
